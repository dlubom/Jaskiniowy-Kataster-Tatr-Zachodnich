<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaskiniowy Kataster Tatr Zachodnich — Model 3D</title>
    <meta name="description" content="Interaktywny model 3D jaskiń Tatr Zachodnich — dane pomiarowe w formacie Walls/Survex">
    <link type="text/css" href="CaveView/css/caveview.css" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        #viewer { width: 100vw; height: 100vh; }

        /* Info button + popup */
        .info-btn {
            position: fixed;
            top: 8px;
            right: 8px;
            z-index: 1000;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            line-height: 28px;
            text-align: center;
        }
        .info-btn:hover { background: rgba(0, 0, 0, 0.85); color: #fff; }

        .info-popup {
            display: none;
            position: fixed;
            top: 44px;
            right: 8px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            color: #ccc;
            font-size: 13px;
            padding: 12px 16px;
            border-radius: 6px;
            line-height: 1.7;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            max-width: 340px;
        }
        .info-popup.visible { display: block; }
        .info-popup .title { color: #fff; font-weight: 600; font-size: 14px; }
        .info-popup .version { color: #aaa; font-size: 12px; }
        .info-popup a { color: #8cb4ff; text-decoration: none; }
        .info-popup a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="viewer" class="cv-container"></div>

    <button class="info-btn" onclick="document.getElementById('info-popup').classList.toggle('visible')" title="Informacje">i</button>

    <div id="info-popup" class="info-popup">
        <div class="title">Jaskiniowy Kataster Tatr Zachodnich</div>
        <div class="version">__VERSION__</div>
        <div>Dane pomiarowe jaskin Tatr Zachodnich w formacie Walls/Survex</div>
        <div style="margin-top: 6px;">
            <a href="https://github.com/dlubom/Jaskiniowy-Kataster-Tatr-Zachodnich" target="_blank" rel="noopener">GitHub</a>
            &middot;
            <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>
        </div>
    </div>

    <script type="text/javascript" src="CaveView/js/CaveView2.js"></script>
    <script type="text/javascript" src="CaveView/lib/OSMProvider.js"></script>

    <script type="text/javascript">
        window.onload = function () {

            var viewer = new CV2.CaveViewer( 'viewer', {
                home: 'CaveView/',
                surveyDirectory: './',
                showEditPage: false,
                showExportPage: true,
                saturatedGradient: true,
                avenControls: true,
                view: {
                    cameraType: CV2.CAMERA_PERSPECTIVE,
                    shadingMode: CV2.SHADING_HEIGHT,
                    box: true,
                    HUD: true,
                    stations: false,
                    stationLabels: true,
                    entrances: true,
                    splays: false,
                    walls: false,
                    surface: true
                }
            } );

            // TODO: przygotowac kafelki DTM dla CaveView (terrain tiles)
            // viewer.addOverlay( 'OpenStreetMap', new OSMProvider() );

            var ui = new CV2.CaveViewUI( viewer );

            ui.loadCave( 'KATASTER.3d' );

            document.addEventListener( 'click', function ( e ) {
                var popup = document.getElementById( 'info-popup' );
                var btn = document.querySelector( '.info-btn' );
                if ( popup.classList.contains( 'visible' ) && !popup.contains( e.target ) && e.target !== btn ) {
                    popup.classList.remove( 'visible' );
                }
            } );

        };
    </script>
</body>
</html>
