name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SURVEX_COMMIT: "f8e8a88c48e1d48921995b5a5846ae5c10306b8e"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set version in INFO.txt
        run: sed -i 's/__VERSION__/${{ steps.version.outputs.VERSION }}/' INFO.txt

      - name: Cache Survex
        id: cache-survex
        uses: actions/cache@v4
        with:
          path: ~/survex
          key: survex-${{ env.SURVEX_COMMIT }}-ubuntu

      - name: Install Survex
        run: |
          if [ "${{ steps.cache-survex.outputs.cache-hit }}" = "true" ]; then
            echo "Using cached Survex"
            sudo apt-get update && sudo apt-get install -y libproj25 libgdal34t64 gdal-bin libwxgtk3.2-1t64
          else
            sudo apt-get update && sudo apt-get install -y \
              build-essential autoconf automake libwxgtk3.2-dev libproj-dev libgdal-dev \
              liblocale-po-perl unifont python3-sphinx latexmk \
              texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
              gdal-bin
            git clone https://github.com/ojwb/survex.git survex-src
            cd survex-src
            git checkout ${{ env.SURVEX_COMMIT }}
            autoreconf -fiv
            ./configure --prefix=$HOME/survex
            (cd src && python3 igrf2c.py igrf14coeffs.txt && mv ../thgeomagdata.h .)
            make
            make install
          fi
          echo "$HOME/survex/bin" >> $GITHUB_PATH

      - name: Build exports
        run: bash docker/exports.sh ${{ steps.version.outputs.VERSION }} .

      - name: Build release ZIP
        run: |
          zip -r "JKTZ-${{ steps.version.outputs.VERSION }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/*" \
            -x "docker/*" \
            -x ".gitignore" \
            -x "CLAUDE.md" \
            -x "doc/*" \
            -x "logs/*" \
            -x "*/_RAW/*" \
            -x "*.DS_Store" \
            -x "*.nta" \
            -x "*.ntn" \
            -x "*.ntv" \
            -x "*.nts" \
            -x "*.ntp" \
            -x "*.wrl" \
            -x "*.log" \
            -x "*.lst" \
            -x "web/*"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Extract content between the first ## [vX.Y.Z] header and the next ## header
          NOTES=$(awk '/^## \['"${{ steps.version.outputs.VERSION }}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          # Write to file for the release action
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            JKTZ-${{ steps.version.outputs.VERSION }}.zip
            JKTZ-exports-${{ steps.version.outputs.VERSION }}.zip
