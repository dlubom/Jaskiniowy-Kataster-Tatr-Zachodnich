name: Validate (cavern)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            experimental: false
          - os: windows-latest
            experimental: true
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install latest Survex (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            survex \
            autoconf automake libtool pkg-config make g++ gettext autopoint \
            libwxgtk3.2-dev libproj-dev libgdal-dev

          SURVEX_VERSION=1.4.20
          curl -fsSL "https://github.com/ojwb/survex/archive/refs/tags/v${SURVEX_VERSION}.tar.gz" -o survex.tar.gz
          tar -xzf survex.tar.gz
          cd "survex-${SURVEX_VERSION}"
          autoreconf -fi
          ./configure
          make -C src thgeomagdata.h >/dev/null
          make -C src -j"$(nproc)" cavern >/dev/null
          sudo install -m 0755 src/cavern /usr/local/bin/cavern
          sudo mkdir -p /usr/local/share
          sudo ln -sfn /usr/share/survex /usr/local/share/survex

      - name: Install Survex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id Survex.Survex --exact --silent --accept-package-agreements --accept-source-agreements

      - name: Check Survex version
        shell: bash
        run: cavern --version

      - name: Check SRV file naming
        if: runner.os == 'Linux'
        run: |
          bad=$(find Poligony -name "*.srv" -not -path "*/_RAW/*" -type f)
          if [ -n "$bad" ]; then
            echo "::error::Lowercase .srv files found (should be .SRV):"
            echo "$bad"
            exit 1
          fi

      - name: Check for invalid directives
        if: runner.os == 'Linux'
        run: |
          if grep -r --include='*.SRV' '#<' Poligony/; then
            echo "::error::Invalid #< directive found"
            exit 1
          fi

      - name: Compile survey files with cavern (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          failures=0

          while IFS= read -r -d '' f; do
            base=$(basename "$f" .SRV)
            log="$tmpdir/$base.log"
            if ! cavern -o "$tmpdir/$base.3d" "$f" >"$log" 2>&1; then
              echo "::group::cavern failure: $f"
              cat "$log"
              echo "::endgroup::"
              echo "::error file=$f::cavern compilation failed"
              failures=$((failures + 1))
            fi
          done < <(find Poligony -name '*_S.SRV' -not -path '*/_RAW/*' -type f -print0)

          if [ "$failures" -ne 0 ]; then
            echo "Total cavern failures: $failures"
            exit 1
          fi

      - name: Install Walls (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msiUrl = 'https://github.com/wallscavesurvey/walls/releases/download/v2.2/WallsInstaller-2.2-2024-12-21.msi'
          $msiPath = Join-Path $env:RUNNER_TEMP 'walls.msi'
          Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList @('/i', $msiPath, '/qn', '/norestart') -Wait

      - name: Compile Walls project with F9 (Windows, experimental)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $wshell = New-Object -ComObject WScript.Shell

          $candidates = @(
            (Join-Path $env:ProgramFiles 'Walls\Walls32.exe'),
            (Join-Path ${env:ProgramFiles(x86)} 'Walls\Walls32.exe')
          )
          $wallsExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $wallsExe) {
            throw "Walls32.exe not found in standard install paths"
          }

          $proj = Join-Path $env:GITHUB_WORKSPACE 'KATASTER.wpj'
          $proc = Start-Process -FilePath $wallsExe -ArgumentList @($proj) -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru

          Start-Sleep -Seconds 15
          $activated = $wshell.AppActivate($proc.Id)
          if (-not $activated) {
            Write-Warning "Could not AppActivate Walls PID $($proc.Id); trying SendKeys anyway"
          }

          $wshell.SendKeys('{F9}')
          Start-Sleep -Seconds 45
          $wshell.SendKeys('%{F4}')

          try { $proc.WaitForExit(60 * 1000) } catch { }
          if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }

          $outDir = Join-Path $env:GITHUB_WORKSPACE 'KATASTER'
          if (-not (Test-Path $outDir)) {
            Get-ChildItem -Path $env:GITHUB_WORKSPACE -Force | Format-Table -AutoSize | Out-String | Write-Host
            throw 'Expected KATASTER output directory was not created by Walls compilation'
          }
