name: Validate (cavern)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SURVEX_VERSION: "1.4.20"

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Survex (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libwxgtk3.2-dev libproj-dev libgdal-dev
          wget https://survex.com/software/${{ env.SURVEX_VERSION }}/survex-${{ env.SURVEX_VERSION }}.tar.gz
          tar xf survex-${{ env.SURVEX_VERSION }}.tar.gz
          cd survex-${{ env.SURVEX_VERSION }}
          ./configure
          make
          sudo make install

      - name: Install Survex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://survex.com/software/${{ env.SURVEX_VERSION }}/survex-microsoft-windows-${{ env.SURVEX_VERSION }}.exe" -OutFile survex-installer.exe
          Start-Process -Wait -FilePath .\survex-installer.exe -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
          echo "C:\Program Files (x86)\Survex" >> $env:GITHUB_PATH

      - name: Check SRV file naming
        if: runner.os == 'Linux'
        run: |
          bad=$(find Poligony -name "*.srv" -not -path "*/_RAW/*" -type f)
          if [ -n "$bad" ]; then
            echo "::error::Lowercase .srv files found (should be .SRV):"
            echo "$bad"
            exit 1
          fi

      - name: Check for invalid directives
        if: runner.os == 'Linux'
        run: |
          if grep -r --include='*.SRV' '#<' Poligony/; then
            echo "::error::Invalid #< directive found"
            exit 1
          fi

      - name: Compile with cavern
        shell: bash
        run: |
          cavern KATASTER.wpj 2>&1 | tee cavern_output.txt

      - name: Check for unattached stations
        shell: bash
        run: |
          if grep -qE "not attached to a (fixed|control) point" cavern_output.txt; then
            echo "::error::Cavern detected survey stations not attached to a fixed point:"
            sed -n '/not attached to a .* point/,/^$/p' cavern_output.txt
            exit 1
          fi

