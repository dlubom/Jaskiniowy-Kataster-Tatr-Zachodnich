name: Validate (cavern)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            experimental: false
          - os: windows-latest
            experimental: true
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install latest Survex (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config make g++ gettext \
            libwxgtk3.2-dev libproj-dev

          SURVEX_VERSION=1.4.20
          curl -fsSL "https://github.com/ojwb/survex/archive/refs/tags/v${SURVEX_VERSION}.tar.gz" -o survex.tar.gz
          tar -xzf survex.tar.gz
          cd "survex-${SURVEX_VERSION}"
          autoreconf -fi
          ./configure
          make -C src -j"$(nproc)" cavern
          sudo install -m 0755 src/cavern /usr/local/bin/cavern

      - name: Install Survex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id Survex.Survex --exact --silent --accept-package-agreements --accept-source-agreements

      - name: Check Survex version
        shell: bash
        run: cavern --version

      - name: Check SRV file naming
        if: runner.os == 'Linux'
        run: |
          bad=$(find Poligony -name "*.srv" -not -path "*/_RAW/*" -type f)
          if [ -n "$bad" ]; then
            echo "::error::Lowercase .srv files found (should be .SRV):"
            echo "$bad"
            exit 1
          fi

      - name: Check for invalid directives
        if: runner.os == 'Linux'
        run: |
          if grep -r --include='*.SRV' '#<' Poligony/; then
            echo "::error::Invalid #< directive found"
            exit 1
          fi

      - name: Compile all surveys with cavern (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          failures=0

          while IFS= read -r -d '' f; do
            base=$(basename "$f" .SRV)
            if ! cavern -q -o "$tmpdir/$base.3d" "$f" >/dev/null 2>&1; then
              echo "::error file=$f::cavern compilation failed"
              failures=$((failures + 1))
            fi
          done < <(find Poligony -name '*.SRV' -not -path '*/_RAW/*' -type f -print0)

          if [ "$failures" -ne 0 ]; then
            echo "Total cavern failures: $failures"
            exit 1
          fi
