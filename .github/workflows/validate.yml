name: Validate (cavern)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            experimental: false
          - os: windows-latest
            experimental: true
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Survex (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y survex

      - name: Install Survex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id Survex.Survex --exact --silent --accept-package-agreements --accept-source-agreements

      - name: Check Survex version
        shell: bash
        run: |
          cavern --version

      - name: Check SRV file naming
        if: runner.os == 'Linux'
        run: |
          bad=$(find Poligony -name "*.srv" -not -path "*/_RAW/*" -type f)
          if [ -n "$bad" ]; then
            echo "::error::Lowercase .srv files found (should be .SRV):"
            echo "$bad"
            exit 1
          fi

      - name: Check for invalid directives
        if: runner.os == 'Linux'
        run: |
          if grep -r --include='*.SRV' '#<' Poligony/; then
            echo "::error::Invalid #< directive found"
            exit 1
          fi

      - name: Compile Walls project (Windows, experimental)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msiUrl = 'https://github.com/wallscavesurvey/walls/releases/download/v2.2/WallsInstaller-2.2-2024-12-21.msi'
          $msiPath = Join-Path $env:RUNNER_TEMP 'walls.msi'
          Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList @('/i', $msiPath, '/qn', '/norestart') -Wait

          Add-Type -AssemblyName System.Windows.Forms

          $wallsExe = Join-Path $env:ProgramFiles 'Walls\Walls32.exe'
          if (-not (Test-Path $wallsExe)) {
            throw "Walls32.exe not found at $wallsExe"
          }

          $proj = Join-Path $env:GITHUB_WORKSPACE 'KATASTER.wpj'
          $proc = Start-Process -FilePath $wallsExe -ArgumentList @($proj) -PassThru

          Start-Sleep -Seconds 8
          [System.Windows.Forms.SendKeys]::SendWait('{F9}')
          Start-Sleep -Seconds 25
          [System.Windows.Forms.SendKeys]::SendWait('%{F4}')

          try { $proc.WaitForExit(30 * 1000) } catch { }

          if (-not (Test-Path (Join-Path $env:GITHUB_WORKSPACE 'KATASTER'))) {
            throw 'Expected KATASTER output directory was not created by Walls compilation'
          }
